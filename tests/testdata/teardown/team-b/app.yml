apiVersion: shrine/v1
kind: Application
metadata:
  name: dependent-app
  owner: shrine-teardown-b
spec:
  image: traefik/whoami
  port: 80
  replicas: 1
  dependencies:
    - kind: Resource
      name: shared-cache
      owner: shrine-teardown-a
  env:
    - name: CACHE_HOST
      valueFrom: resource.shared-cache.host
  networking:
    exposeToPlatform: false
