apiVersion: shrine/v1
kind: Application
metadata:
  name: hello-api
  owner: team-a
spec:
  image: hello-api
  port: 8080
  replicas: 1
  routing:
    domain: hello-api.home.lab
    pathPrefix: /hello-api
    aliases:
      - host: lan.home.lab
      - host: gateway.tail9a6ddb.ts.net
        pathPrefix: /notes
      - host: gateway.tail9a6ddb.ts.net
        pathPrefix: /notes-raw
        stripPrefix: false
  dependencies:
    - kind: Resource
      name: hello-db
      owner: team-a
  env:
    - name: DATABASE_URL
      valueFrom: resource.hello-db.url
    - name: NODE_ENV
      value: production
  networking:
    exposeToplatform: false
