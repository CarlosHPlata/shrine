apiVersion: shrine/v1
kind: Application
metadata:
  name: test-app
  owner: vault-team
spec:
  image: nginx:alpine
  port: 8080
  dependencies:
    - kind: Resource
      name: test-db
      owner: vault-team
  env:
    - name: DB_PASSWORD
      valueFrom: resource.test-db.password
    - name: API_KEY
      valueFrom: vault:486975e5-b3a2-49d4-8c54-9702270c25ce/prod/API_KEY
