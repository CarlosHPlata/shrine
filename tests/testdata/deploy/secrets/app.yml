apiVersion: shrine/v1
kind: Application
metadata:
  name: whoami-secrets
  owner: shrine-deploy-test
spec:
  image: traefik/whoami
  port: 80
  replicas: 1
  dependencies:
    - kind: Resource
      name: secret-store
      owner: shrine-deploy-test
  env:
    - name: SECRET_PASSWORD
      valueFrom: resource.secret-store.password
    - name: SECRET_CONNECTION
      valueFrom: resource.secret-store.connection
  networking:
    exposeToPlatform: false
