apiVersion: shrine/v1
kind: Resource
metadata:
  name: secret-store
  owner: shrine-deploy-test
spec:
  type: cache
  version: "1"
  image: traefik/whoami
  outputs:
    - name: password
      generated: true
    - name: connection
      template: "redis://{{.host}}:6379"
  networking:
    exposeToPlatform: false
