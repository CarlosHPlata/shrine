apiVersion: shrine/v1
kind: Resource
metadata:
  name: secret-store
  owner: shrine-deploy-test
spec:
  type: cache
  version: "1"
  port: 6379
  image: traefik/whoami
  outputs:
    - name: host
    - name: port
    - name: password
      generated: true
    - name: connection
      template: "redis://{{.host}}:{{.port}}"
  networking:
    exposeToPlatform: false
