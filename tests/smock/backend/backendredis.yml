apiVersion: shrine/v1
kind: Resource
metadata:
  name: backendredis
  owner: backend
spec:
  type: redis
  version: latest
  port: 6379
  image: 'bitnami/redis:latest'
  outputs:
    - name: host
    - name: port
    - name: REDIS_USERNAME
      value: default
    - name: REDIS_DATABASES
      value: 16
    - name: REDIS_PASSWORD
      generated: true

  networking:
    exposeToPlatform: false
