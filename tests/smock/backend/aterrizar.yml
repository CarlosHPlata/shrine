apiVersion: shrine/v1
kind: Application
metadata:
  name: aterrizar
  owner: backend
spec:
  image: 192.168.1.206:8080/aterrizar:latest
  port: 8080
  replicas: 1
  routing:
    domain: aterrizar.shrine.lab
    pathPrefix: /aterrizar
  dependencies:
    - kind: Resource
      name: backendredis
      owner: backend
    - kind: Application
      name: externaldeps
      owner: external
  env:
    - name: "SPRING_DATA_REDIS_HOST"
      valueFrom: resource.backendredis.host
    - name: "SPRING_DATA_REDIS_PORT"
      valueFrom: resource.backendredis.port
    - name: "SPRING_DATA_REDIS_USERNAME"
      valueFrom: resource.backendredis.REDIS_USERNAME
    - name: "SPRING_DATA_REDIS_PASSWORD"
      valueFrom: resource.backendredis.REDIS_PASSWORD
    - name: externalport
      valueFrom: application.externaldeps.port
    - name: externalhost
      valueFrom: application.externaldeps.host
    - name: HTTP_CLIENT_AVIATOR_BASE_URL
      template: "http://{{.externalhost}}:{{.externalport}}/aviator/api/"
    - name: HTTP_CLIENT_EXPERIMENTAL_PLATFORM_BASE_URL
      template: "http://{{.externalhost}}:{{.externalport}}/experimentation/api/"
    - name: HTTP_CLIENT_TAX_BASE_URL
      template: "http://{{.externalhost}}:{{.externalport}}/tax-service/"
  networking:
    exposeToPlatform: true
