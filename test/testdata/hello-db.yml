apiVersion: shrine/v1
kind: Resource
metadata:
  name: hello-db
  owner: team-a
  access:
    - team-b
spec:
  type: postgres
  version: "16"
  outputs:
    - name: host
    - name: port
      value: "5432"
    - name: database
      value: "hello"
    - name: password
      generated: true
    - name: url
      template: "postgres://postgres:{{.password}}@{{.host}}:{{.port}}/{{.database}}"
  networking:
    exposeToplatform: false
