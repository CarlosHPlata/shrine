name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Unit Test
        run: go test ./...

  integration-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Start Infisical stack
        run: |
          docker compose \
            -f tests/testdata/deploy/vault-secrets/docker-compose.yml \
            up -d
        env:
          ENCRYPTION_KEY: ${{ secrets.INFISICAL_ENCRYPTION_KEY }}
          AUTH_SECRET: ${{ secrets.INFISICAL_AUTH_SECRET }}

      - name: Wait for Infisical to be ready
        run: |
          echo "Waiting for Infisical..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/status > /dev/null 2>&1; then
              echo "Infisical is ready."
              exit 0
            fi
            echo "  attempt $i/30..."
            sleep 5
          done
          echo "Infisical did not become ready in time."
          docker compose -f tests/testdata/deploy/vault-secrets/docker-compose.yml logs
          exit 1

      - name: Provision Infisical test data
        run: bash tests/testdata/deploy/vault-secrets/provision.sh
        env:
          INFISICAL_URL: http://localhost:8080

      - name: Integration Test (full suite)
        run: make test-integration
        env:
          INFISICAL_TEST_URL: http://localhost:8080

      - name: Tear down Infisical stack
        if: always()
        run: |
          docker compose \
            -f tests/testdata/deploy/vault-secrets/docker-compose.yml \
            down -v
