baseURL: "https://carlosh-plata.github.io/shrine/"
languageCode: "en-us"
title: "Shrine CLI"
defaultContentLanguage: "en"
enableRobotsTXT: true
enableGitInfo: true

# We don't use Hugo's auto-taxonomies; disabling them avoids generating
# /categories/ and /tags/ pages that have no source markdown (and therefore
# no index.md companion for the copy-as-Markdown contract).
disableKinds: ["taxonomy", "term"]

# Fail the build (not just warn) when a {{< ref >}} or {{< relref >}}
# shortcode points at a missing page (FR-014: "broken internal link").
refLinksErrorLevel: ERROR
refLinksNotFoundURL: ""

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

# Per-page raw-Markdown output: every page is published at /<path>/index.md
# (in addition to /<path>/index.html) so the "copy as Markdown" button can
# fetch the verbatim source and AI agents can consume pages directly.
# Contract: specs/013-docs-site/contracts/copy-as-md-url.md
outputFormats:
  markdown:
    mediaType: text/markdown
    baseName: index
    suffix: md
    isPlainText: true
    notAlternative: true

outputs:
  home: [HTML, RSS, markdown]
  section: [HTML, RSS, markdown]
  page: [HTML, markdown]

params:
  description: "Official documentation for the Shrine CLI — declarative, kubectl-style infrastructure for homelab and small teams."
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: "logo.webp"
  page:
    width: "wide"
  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: false
  editURL:
    enable: true
    base: "https://github.com/CarlosHPlata/shrine/edit/main/docs/content"
  theme:
    default: "system"
    displayToggle: true
  # version is injected at build time by the GitHub Actions workflow
  # (T028) via `--config` override; leave blank locally.
  version: ""

menu:
  main:
    - identifier: getting-started
      name: Getting Started
      pageRef: /getting-started
      weight: 10
    - identifier: cli
      name: CLI Reference
      pageRef: /cli
      weight: 20
    - identifier: guides
      name: Guides
      pageRef: /guides
      weight: 30
    - identifier: reference
      name: Reference
      pageRef: /reference
      weight: 40
    - identifier: troubleshooting
      name: Troubleshooting
      pageRef: /troubleshooting
      weight: 50
    - name: GitHub
      url: "https://github.com/CarlosHPlata/shrine"
      weight: 60
      params:
        icon: github
